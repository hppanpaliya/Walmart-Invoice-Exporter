name: CI

on:
  push:
    branches:
      - "*"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # The unit tests parse real generated .xlsx output via the exceljs
      # devDependency, so the test job needs node_modules too.
      - name: Install dev dependencies
        run: npm ci

      - name: Syntax check every extension script
        run: |
          for f in *.js; do
            if [ "$f" = "exceljs.bare.min.js" ]; then continue; fi
            node --check "$f"
          done

      - name: Unit tests (extractors, export writers, fixtures)
        run: node --test tests/*.test.js

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dev dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (real extension, mocked walmart.com)
        run: npm run test:e2e
