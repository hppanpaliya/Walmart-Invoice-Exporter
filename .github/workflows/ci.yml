name: CI

on:
  push:
    branches:
      # "**" (not "*"): single-star patterns don't match "/" in GitHub
      # Actions, so branches like feature/wxt would silently never build.
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      # The unit tests parse real generated .xlsx output via the exceljs
      # devDependency, so the test job needs node_modules too.
      - name: Install dev dependencies
        run: pnpm install --frozen-lockfile

      - name: Syntax check every extension script
        run: |
          for f in public/*.js public/providers/*.js entrypoints/*.js; do
            if [ "$f" = "public/exceljs.bare.min.js" ]; then continue; fi
            node --check "$f"
          done

      # Validates wxt.config.ts and produces the loadable extension — the
      # same output `wxt zip` packages for the stores.
      - name: Build (Chrome MV3)
        run: pnpm exec wxt build

      - name: Build (Firefox MV3)
        run: pnpm exec wxt build -b firefox --mv3

      - name: Unit tests (extractors, export writers, fixtures)
        run: node --test tests/*.test.js

      # The same 212 tests, ported to Vitest (tests-vitest/) — both run until
      # the node:test originals are retired.
      - name: Unit tests (Vitest port)
        run: pnpm exec vitest run

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dev dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      # The e2e harness runs `npx wxt build` itself and loads
      # .output/chrome-mv3 into a real Chromium.
      - name: End-to-end tests (real extension, mocked walmart.com)
        run: pnpm run test:e2e
