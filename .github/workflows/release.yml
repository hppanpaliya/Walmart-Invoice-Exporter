name: Create Branch Release

on:
  push:
    branches:
      # "**" (not "*"): single-star patterns don't match "/" in GitHub
      # Actions, so branches like feature/wxt would silently never release.
      - "**"  # Run on all branches
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get branch name
        id: branch
        # Slashes in branch names (feature/wxt) would nest the release tag
        # under a path — flatten them to dashes (v8.0-feature-wxt).
        run: echo "branch=${GITHUB_REF_NAME//\//-}" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dev dependencies
        run: npm ci

      # WXT builds + packages every target from wxt.config.ts — the manifest,
      # file list, and Firefox transforms all live there now (the old
      # cp-list/build-edge.sh/build-firefox.sh machinery is gone). Edge runs
      # the Chrome package unmodified, as before.
      - name: Build store packages
        run: |
          npx wxt zip
          npx wxt zip -b firefox --mv3

      - name: Get version from the built manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' dist/chrome-mv3/manifest.json)
          echo "version=$VERSION" >> $GITHUB_ENV
        shell: bash

      - name: Read CHANGELOG
        id: changelog
        run: |
          CHANGELOG=$(cat CHANGELOG.md)
          echo "changelog<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ---------------------------
      # Handle versioned release
      # ---------------------------
      - name: Delete existing versioned release
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: v${{ env.version }}-${{ env.branch }}
          delete_release: true
          github_token: ${{ github.token }}
        continue-on-error: true

      - name: Create versioned release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.zip
          tag_name: v${{ env.version }}-${{ env.branch }}
          name: Release v${{ env.version }} - ${{ env.branch }}
          body: ${{ env.changelog }}
          token: ${{ github.token }}

      # ---------------------------
      # Handle "latest" release for this branch
      # ---------------------------
      - name: Delete existing latest release for this branch
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: latest-${{ env.branch }}
          delete_release: true
          github_token: ${{ github.token }}
        continue-on-error: true

      - name: Create latest release for this branch
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.zip
          tag_name: latest-${{ env.branch }}
          name: Latest Release - ${{ env.branch }}
          body: ${{ env.changelog }}
          token: ${{ github.token }}
