<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Store listing kit — preview</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f2f5f9; color: #16273b; }
  header { padding: 20px 28px 6px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.note { color: #5a6b80; font-size: 13px; margin: 0; }
  section { padding: 14px 28px 6px; }
  h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .06em; color: #47586d; margin: 12px 0 10px; }
  figure { margin: 0 0 26px; }
  figure img { width: 100%; max-width: 980px; display: block; border-radius: 10px; box-shadow: 0 8px 30px rgba(10,30,60,.15); }
  figcaption { font-size: 13px; color: #47586d; margin-top: 8px; }
  .tiles { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
  .tiles figure img { max-width: 700px; }
  .tiles figure.small img { max-width: 440px; width: 440px; }
</style>
</head>
<body>
<header>
  <h1>Chrome Web Store listing kit — all generated assets</h1>
  <p class="note">Everything lives in <code>store-assets/</code> (untracked, not committed, not published). Sizes are exact CWS specs.</p>
</header>
<section>
  <h2>Screenshots (1280×800)</h2>
  <figure><img src="screenshots/01-hero-dashboard-1280x800.png"><figcaption>01 — Hero: dashboard + embedded live panel</figcaption></figure>
  <figure><img src="screenshots/02-export-formats-1280x800.png"><figcaption>02 — Export formats (panel close-up)</figcaption></figure>
  <figure><img src="screenshots/03-month-drilldown-1280x800.png"><figcaption>03 — Month drill-down (January selected)</figcaption></figure>
  <figure><img src="screenshots/04-dark-mode-1280x800.png"><figcaption>04 — Dark mode</figcaption></figure>
  <figure><img src="screenshots/05-privacy-1280x800.png"><figcaption>05 — Privacy / Settings</figcaption></figure>
</section>
<section>
  <h2>Promo tiles</h2>
  <div class="tiles">
    <figure class="small"><img src="tiles/small-tile-440x280.png"><figcaption>Small tile 440×280</figcaption></figure>
    <figure><img src="tiles/marquee-1400x560.png"><figcaption>Marquee 1400×560</figcaption></figure>
  </div>
</section>
</body>
</html>
